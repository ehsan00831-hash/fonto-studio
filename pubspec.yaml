name: fonto_studio
description: A standalone Persian/Arabic text-on-image story editor for Android.
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  file_picker: ^8.1.3
  share_plus: ^10.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/licenses/README.md
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
    - family: Shabnam
      fonts:
        - asset: assets/fonts/Shabnam.ttf
    - family: Sahel
      fonts:
        - asset: assets/fonts/Sahel.ttf
    - family: Samim
      fonts:
        - asset: assets/fonts/Samim.ttf
    - family: Lalezar
      fonts:
        - asset: assets/fonts/Lalezar-Regular.ttf
    - family: Noto Sans Arabic
      fonts:
        - asset: assets/fonts/NotoSansArabic.ttf
    - family: Noto Naskh Arabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic.ttf
